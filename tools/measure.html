<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CluColor — sprite measure</title>
<link rel="stylesheet" href="../tests/test.css">
</head>
<body>
<h1>sprite content bounds</h1>
<p class="sub" id="status">measuring…</p>
<pre id="out"></pre>

<script type="module">
import { loadImage } from '../js/engine/assets.js';

/**
 * Finds the opaque content box inside each sprite.
 *
 * Two bugs depend on this:
 *   - characters float above the ground (transparent padding under the feet)
 *   - idle (48px) and walk (56px) frames are different sizes, so they'd jump
 *
 * The fix is to anchor on the FEET — the bottom of the opaque content — not on
 * the bottom of the image box.
 */
const FILES = [
  'boy/idle.png',
  ...[0, 1, 2, 3, 4, 5].map((n) => `boy/walk/frame_00${n}.png`),
  'girl/idle.png',
  ...[0, 1, 2, 3, 4, 5].map((n) => `girl/walk/frame_00${n}.png`),
];

const lines = [];
const results = [];

for (const f of FILES) {
  const img = await loadImage(`../assets/img/${f}`);
  const c = document.createElement('canvas');
  c.width = img.width;
  c.height = img.height;
  const ctx = c.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(img, 0, 0);
  const { data } = ctx.getImageData(0, 0, c.width, c.height);

  let top = Infinity, bottom = -1, left = Infinity, right = -1;
  for (let y = 0; y < c.height; y++) {
    for (let x = 0; x < c.width; x++) {
      if (data[(y * c.width + x) * 4 + 3] > 8) {
        if (y < top) top = y;
        if (y > bottom) bottom = y;
        if (x < left) left = x;
        if (x > right) right = x;
      }
    }
  }

  const padBelow = c.height - 1 - bottom; // transparent rows under the feet
  lines.push(
    `${f.padEnd(24)} ${String(c.width).padStart(3)}x${String(c.height).padEnd(3)}` +
    `  content y ${String(top).padStart(2)}..${String(bottom).padStart(2)}` +
    `  x ${String(left).padStart(2)}..${String(right).padStart(2)}` +
    `  padBelow ${String(padBelow).padStart(2)}` +
    `  centreX ${((left + right) / 2).toFixed(1)}`,
  );
  results.push({ name: f, ok: true });
}

document.getElementById('out').textContent = lines.join('\n');
document.getElementById('status').textContent = `${FILES.length} sprites`;
document.getElementById('status').className = 'sub ok';

await fetch('/__report', {
  method: 'POST',
  headers: { 'content-type': 'application/json' },
  body: JSON.stringify({ suite: 'measure\n' + lines.join('\n'), ua: navigator.userAgent, results }),
}).catch(() => {});
</script>
</body>
</html>
