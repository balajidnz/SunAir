<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>sunair.fun</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    height: 100%;
    margin: 0;
    background: #14161c;
    color: #6f7686;
    font: 500 14px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
    display: grid;
    place-items: center;
    text-align: center;
    -webkit-font-smoothing: antialiased;
  }
  .dot {
    width: 10px;
    height: 10px;
    margin: 0 auto 22px;
    background: #c8433f;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: .25; }
    50%      { opacity: 1; }
  }
  p { margin: 0; letter-spacing: .18em; text-transform: uppercase; font-size: 12px; }
</style>
</head>
<body>
  <main>
    <div class="dot"></div>
    <p>soon</p>
  </main>
</body>
</html>
