<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="content-security-policy"
      content="default-src 'self'; img-src 'self' data:; media-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta name="robots" content="noindex, nofollow">
<title>CluColor</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- The stage keeps a 16:9 box centred in the window; everything inside is
     positioned against it, so the DOM UI lines up with the canvas at any scale. -->
<div id="stage">
  <!-- The world. Filtered by colorGrade. -->
  <canvas id="game" width="320" height="180"></canvas>

  <!-- Objects exempt from the grade — the red bench keeps its colour in the
       dead world. Same backing store, same camera, never filtered. -->
  <canvas id="fx" width="320" height="180"></canvas>

  <!-- Cool grey wash. Opacity is driven by colorLevel; this is what makes the
       desaturated world read as *dead* rather than merely monochrome. -->
  <div id="tint"></div>

  <!-- All text and interaction. DOM, never canvas: canvas text input is a
       two-day rabbit hole that breaks keyboards, emoji and font fallback. -->
  <div id="ui"></div>
</div>

<!-- Dev only. Stripped before ship. -->
<div id="debug">
  <label>colorLevel <input id="debug-color" type="range" min="0" max="1" step="0.01" value="0"></label>
  <output id="debug-color-value">0.00</output>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
