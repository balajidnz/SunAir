<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="content-security-policy"
      content="default-src 'self'; img-src 'self' data:; media-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta name="robots" content="noindex, nofollow">
<title>CluColor</title>
<meta name="description" content="Two people wake in a world with no colour. Three clues bring it back.">

<!-- The link preview — the gift ARRIVES as a link, and this is the whole of the
     first impression in a chat list. Absolute URLs are mandatory: unfurlers do
     not resolve relative paths. `noindex` above keeps search engines out; it does
     NOT stop chat apps unfurling these, which is exactly the split we want. -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="sunair.fun">
<meta property="og:title" content="CluColor">
<meta property="og:description" content="Two people wake in a world with no colour. Three clues bring it back.">
<meta property="og:url" content="https://sunair.fun/clucolor/">
<meta property="og:image" content="https://sunair.fun/clucolor/assets/img/og.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="CluColor — a red bench in a grey world">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="CluColor">
<meta name="twitter:description" content="Two people wake in a world with no colour. Three clues bring it back.">
<meta name="twitter:image" content="https://sunair.fun/clucolor/assets/img/og.jpg">

<link rel="icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="stage">
  <!-- One world canvas. Layers are composited inside it with ctx.filter, which
       is what lets the bench sit BEHIND the characters while staying exempt
       from the grey grade. -->
  <canvas id="game" width="480" height="270"></canvas>

  <!-- Cool grey wash. Opacity driven by colorLevel; this is what makes the
       desaturated world read as *dead* rather than merely monochrome. -->
  <div id="tint"></div>

  <!-- All text and interaction. DOM, never canvas. -->
  <div id="ui"></div>

  <!-- Cutscene fade. Covers the world but NOT the UI, so dialogue can play
       over black while they step inside the house. -->
  <div id="fade"></div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
